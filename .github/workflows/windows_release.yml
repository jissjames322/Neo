name: NEO — Build & Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis (zero warnings)
        run: flutter analyze --no-fatal-infos

  build:
    name: Build & Release Windows App
    runs-on: windows-latest
    needs: analyze
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows application (release)
        run: flutter build windows --release

      - name: Calculate next version
        id: release_meta
        shell: bash
        run: |
          # Fetch all git tags
          git fetch --tags

          # Find the latest semver tag, default to v2.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-2}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}

          PATCH=$((PATCH + 1))
          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          COMMIT_MSG="${{ github.event.head_commit.message }}"
          IS_PRERELEASE=false
          RELEASE_TITLE="NEO ${NEXT_VERSION}"
          TAG_SUFFIX=""

          if echo "$COMMIT_MSG" | grep -iq "prerelease\|pre-release\|beta\|alpha"; then
            IS_PRERELEASE=true
            RELEASE_TITLE="[Pre-release] NEO ${NEXT_VERSION}"
          fi

          if echo "$COMMIT_MSG" | grep -iq "demo"; then
            TAG_SUFFIX="-demo"
            RELEASE_TITLE="[Demo] NEO ${NEXT_VERSION}"
          fi

          FINAL_TAG="${NEXT_VERSION}${TAG_SUFFIX}"
          echo "tag_name=${FINAL_TAG}" >> $GITHUB_OUTPUT
          echo "release_title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $zipPath    = "build\windows\neo-windows-release.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath
          echo "Packaged release to $zipPath"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/windows/neo-windows-release.zip,build/windows/x64/runner/Release/neo.exe"
          tag: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_title }}
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## NEO — YouTube Music Player ${{ steps.release_meta.outputs.tag_name }}

            Stream music from YouTube, ad-free, powered by **yt-dlp**.

            ### What's included
            - `neo.exe` — Standalone Windows executable
            - `neo-windows-release.zip` — Full release bundle (all DLLs included)

            ### First-time setup
            **yt-dlp is auto-downloaded on first launch** — no manual install needed.

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            *Built with Flutter on `windows-latest` via GitHub Actions.*
